def runExternalCommand(List<String> command, File workingDirectory = null, Map<String, String> environmentOverrides = [:]) {
    def normalizedCommand = command.collect { it.toString() }
    def processBuilder = new ProcessBuilder(normalizedCommand)
    if (workingDirectory != null) {
        processBuilder.directory(workingDirectory)
    }
    processBuilder.environment().putAll(environmentOverrides)
    processBuilder.inheritIO()
    def process = processBuilder.start()
    def exitCode = process.waitFor()
    if (exitCode != 0) {
        throw new GradleException("Command failed with exit code ${exitCode}: ${normalizedCommand.join(' ')}")
    }
}

def resolveExecutable(String candidate, String displayName, String installHint = "Install ${displayName}, or configure its path.") {
    def candidateFile = new File(candidate)
    if (candidateFile.isAbsolute() || candidate.contains(File.separator)) {
        if (!candidateFile.isAbsolute()) {
            candidateFile = file(candidate)
        }
        if (candidateFile.exists() && candidateFile.canExecute()) {
            return candidateFile.absolutePath
        }
        throw new GradleException("${displayName} was not found or is not executable at ${candidateFile}. ${installHint}")
    }

    def path = System.getenv('PATH') ?: ''
    for (String entry : path.split(File.pathSeparator)) {
        if (entry == null || entry.isBlank()) {
            continue
        }
        def executable = new File(entry, candidate)
        if (executable.exists() && executable.canExecute()) {
            return executable.absolutePath
        }
    }

    throw new GradleException("${displayName} was not found on PATH. ${installHint}")
}
