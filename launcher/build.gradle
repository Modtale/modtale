def javafxPlatform() {
    def os = org.gradle.internal.os.OperatingSystem.current()
    def arch = System.getProperty('os.arch', '').toLowerCase(Locale.ROOT)
    if (os.isWindows()) {
        return 'win'
    }
    if (os.isMacOsX()) {
        return arch.contains('aarch64') || arch.contains('arm64') ? 'mac-aarch64' : 'mac'
    }
    return arch.contains('aarch64') || arch.contains('arm64') ? 'linux-aarch64' : 'linux'
}

def appImageArch() {
    def arch = System.getProperty('os.arch', '').toLowerCase(Locale.ROOT)
    if (arch == 'amd64' || arch == 'x86_64') {
        return 'x86_64'
    }
    if (arch.contains('aarch64') || arch.contains('arm64')) {
        return 'aarch64'
    }
    return arch.replaceAll(/[^a-z0-9_+-]/, '-')
}

def jpackageCompatibleVersion(String version) {
    def parts = version.tokenize('.').collect { Integer.parseInt(it) }
    if (parts.isEmpty()) {
        return '1'
    }
    if (parts[0] < 1) {
        parts[0] = 1
    }
    return parts.take(3).join('.')
}

def debArchitecture() {
    def arch = System.getProperty('os.arch', '').toLowerCase(Locale.ROOT)
    if (arch == 'amd64' || arch == 'x86_64') {
        return 'amd64'
    }
    if (arch.contains('aarch64') || arch.contains('arm64')) {
        return 'arm64'
    }
    return arch.replaceAll(/[^a-z0-9_+-]/, '-')
}

