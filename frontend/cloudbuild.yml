steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull gcr.io/$PROJECT_ID/modtale-frontend:${_TAG} || true
        docker build \
          --cache-from gcr.io/$PROJECT_ID/modtale-frontend:${_TAG} \
          --build-arg PUBLIC_API_URL=${_PUBLIC_API_URL} \
          -t gcr.io/$PROJECT_ID/modtale-frontend:${_TAG} \
          .

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/modtale-frontend:${_TAG}']

substitutions:
  _PUBLIC_API_URL: http://localhost:8080/api/v1
  _TAG: latest

options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
