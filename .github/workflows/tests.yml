name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/tests.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/tests.yml'

  frontend:
    name: Frontend Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

  backend:
    name: Backend Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      MONGODB_URI: mongodb://localhost:27017/modtale-test
      MONGODB_DATABASE_NAME: modtale-test
      R2_BUCKET_NAME: modtale-test
      R2_ACCESS_KEY: test-access-key
      R2_SECRET_KEY: test-secret-key
      R2_ENDPOINT: https://example.com
      R2_PUBLIC_DOMAIN: https://cdn.example.com
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:8080
      WARDEN_ENABLED: "false"
      PRE_AUTH_SECRET: test-pre-auth-secret

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Run backend tests
        run: ./gradlew test

