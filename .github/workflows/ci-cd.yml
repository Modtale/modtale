name: Modtale CI/CD 

on:
  push:
    branches:
      - main
      - develop
      - '**'

env:
  PROJECT_ID: gen-lang-client-0244308719
  REGION: us-central1

jobs:
  deploy:
    if: github.repository == 'Modtale/modtale'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    outputs:
      launcher_build: ${{ steps.filter.outputs.launcher_build }}
      launcher_site_base_url: ${{ steps.launcher_metadata.outputs.site_base_url }}
      launcher_api_base_url: ${{ steps.launcher_metadata.outputs.api_base_url }}
      launcher_version: ${{ steps.launcher_metadata.outputs.version }}
      launcher_artifact_prefix: ${{ steps.launcher_metadata.outputs.artifact_prefix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed components
        id: filter
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: bash .github/scripts/detect-component-changes.sh

      - name: Configure Environment
        id: config
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "Detected branch: $BRANCH_NAME"
          
          if [ "$BRANCH_NAME" = "main" ]; then
            echo "ENV_TYPE=prod" >> $GITHUB_ENV
            echo "BACKEND_SERVICE=modtale-backend" >> $GITHUB_ENV
            echo "FRONTEND_SERVICE=modtale-frontend" >> $GITHUB_ENV
            echo "DB_NAME=modtale" >> $GITHUB_ENV
            echo "SEEDING_ENABLED=false" >> $GITHUB_ENV
            echo "SEEDING_MODE=mock" >> $GITHUB_ENV
            echo "SEEDING_RESET=false" >> $GITHUB_ENV
            echo "SEEDING_SOURCE_DB=modtale-mock-template" >> $GITHUB_ENV
            echo "BACKEND_DOMAIN=https://api.modtale.net" >> $GITHUB_ENV
            echo "FRONTEND_DOMAIN=https://modtale.net" >> $GITHUB_ENV
            echo "TAG=latest" >> $GITHUB_ENV
            echo "R2_BUCKET_NAME=modtale-binaries" >> $GITHUB_ENV
            echo "R2_PUBLIC_DOMAIN=https://cdn.modtale.net" >> $GITHUB_ENV
            echo "WARDEN_SECRET_NAME=WARDEN_API_KEY" >> $GITHUB_ENV
          
          elif [ "$BRANCH_NAME" = "develop" ]; then
            echo "ENV_TYPE=dev" >> $GITHUB_ENV
            echo "BACKEND_SERVICE=modtale-backend-dev" >> $GITHUB_ENV
            echo "FRONTEND_SERVICE=modtale-frontend-dev" >> $GITHUB_ENV
            echo "DB_NAME=modtale" >> $GITHUB_ENV
            echo "SEEDING_ENABLED=false" >> $GITHUB_ENV
            echo "SEEDING_MODE=mock" >> $GITHUB_ENV
            echo "SEEDING_RESET=false" >> $GITHUB_ENV
            echo "SEEDING_SOURCE_DB=modtale-mock-template" >> $GITHUB_ENV
            echo "BACKEND_DOMAIN=https://dev.api.modtale.net" >> $GITHUB_ENV
            echo "FRONTEND_DOMAIN=https://dev.modtale.net" >> $GITHUB_ENV
            echo "TAG=dev" >> $GITHUB_ENV
            echo "R2_BUCKET_NAME=modtale-binaries" >> $GITHUB_ENV
            echo "R2_PUBLIC_DOMAIN=https://cdn.modtale.net" >> $GITHUB_ENV
            echo "WARDEN_SECRET_NAME=WARDEN_API_KEY" >> $GITHUB_ENV
          
          else
            SLUG=$(echo $BRANCH_NAME | sed 's/[^a-zA-Z0-9-]/-/g' | tr '[:upper:]' '[:lower:]' | cut -c 1-20 | sed 's/-$//')
            echo "ENV_TYPE=preview" >> $GITHUB_ENV
            echo "BACKEND_SERVICE=modtale-backend-$SLUG" >> $GITHUB_ENV
            echo "FRONTEND_SERVICE=modtale-frontend-$SLUG" >> $GITHUB_ENV
            echo "DB_NAME=modtale-$SLUG" >> $GITHUB_ENV
            echo "SEEDING_ENABLED=true" >> $GITHUB_ENV
            echo "SEEDING_MODE=template" >> $GITHUB_ENV
            echo "SEEDING_RESET=true" >> $GITHUB_ENV
            echo "SEEDING_SOURCE_DB=modtale-mock-template" >> $GITHUB_ENV
            echo "TAG=$SLUG" >> $GITHUB_ENV
            echo "R2_BUCKET_NAME=modtale-dev" >> $GITHUB_ENV
            echo "R2_PUBLIC_DOMAIN=https://pub-dc8241faa0a343c080802bf00bc72bc5.r2.dev" >> $GITHUB_ENV
            echo "WARDEN_SECRET_NAME=WARDEN_API_KEY" >> $GITHUB_ENV
          fi

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Check Existing Services
        id: check_services
        run: |
          # Check backend service
          if gcloud run services describe ${{ env.BACKEND_SERVICE }} --region ${{ env.REGION }} >/dev/null 2>&1; then
            echo "BACKEND_EXISTS=true" >> $GITHUB_ENV
            B_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} --region ${{ env.REGION }} --format="value(status.url)")
            echo "EXISTING_BACKEND_URL=$B_URL" >> $GITHUB_ENV
            echo "Backend service already exists: $B_URL"
          else
            echo "BACKEND_EXISTS=false" >> $GITHUB_ENV
            echo "Backend service does not exist."
          fi

          # Check frontend service
          if gcloud run services describe ${{ env.FRONTEND_SERVICE }} --region ${{ env.REGION }} >/dev/null 2>&1; then
            echo "FRONTEND_EXISTS=true" >> $GITHUB_ENV
            F_URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} --region ${{ env.REGION }} --format="value(status.url)")
            echo "EXISTING_FRONTEND_URL=$F_URL" >> $GITHUB_ENV
            echo "Frontend service already exists: $F_URL"
          else
            echo "FRONTEND_EXISTS=false" >> $GITHUB_ENV
            echo "Frontend service does not exist."
          fi

      - name: Build and Deploy Backend
        id: deploy_backend
        if: steps.filter.outputs.backend == 'true' || env.BACKEND_EXISTS == 'false'
        run: |
          cd backend
          gcloud builds submit \
            --config=cloudbuild.yml \
            --substitutions=_TAG=${{ env.TAG }} .
          
          ARGS=(
            "--image" "gcr.io/$PROJECT_ID/modtale-backend:${{ env.TAG }}"
            "--region" "$REGION"
            "--allow-unauthenticated"
            "--use-http2"
            "--memory" "1Gi"
            "--update-env-vars" "MONGODB_DATABASE_NAME=${{ env.DB_NAME }}"
            "--update-env-vars" "APP_SEEDING_ENABLED=${{ env.SEEDING_ENABLED }}"
            "--update-env-vars" "APP_SEEDING_MODE=${{ env.SEEDING_MODE }}"
            "--update-env-vars" "APP_SEEDING_RESET=${{ env.SEEDING_RESET }}"
            "--update-env-vars" "APP_SEEDING_SOURCE_DB=${{ env.SEEDING_SOURCE_DB }}"
            "--update-env-vars" "WARDEN_URL=${{ secrets.WARDEN_URL }}"
            "--update-env-vars" "WARDEN_ENABLED=true"
            "--update-env-vars" "FRONTEND_URL=placeholder"
            "--update-env-vars" "R2_BUCKET_NAME=${{ env.R2_BUCKET_NAME }}"
            "--update-env-vars" "R2_PUBLIC_DOMAIN=${{ env.R2_PUBLIC_DOMAIN }}"
          )

          if [ "${{ env.ENV_TYPE }}" = "prod" ]; then
            ARGS+=("--update-secrets" "WARDEN_API_KEY=${{ env.WARDEN_SECRET_NAME }}:latest")
            ARGS+=("--update-secrets" "WEBHOOK_URL=WEBHOOK_URL:latest")
            ARGS+=("--update-secrets" "HYTALEMODDING_KEY=HYTALEMODDING_KEY:latest")
            ARGS+=("--update-secrets" "WIKI_API_KEY=WIKI_API_KEY:latest")
            ARGS+=("--update-secrets" "DISCORD_WEBHOOK_URL=DISCORD_WEBHOOK_URL:latest")
            ARGS+=("--update-secrets" "ADMIN_DISCORD_WEBHOOK_URL=ADMIN_DISCORD_WEBHOOK_URL:latest")
            ARGS+=("--update-secrets" "STATUS_DISCORD_WEBHOOK_URL=STATUS_DISCORD_WEBHOOK_URL:latest")
          else
            ARGS+=("--update-secrets" "MONGODB_URI=MONGODB_URI:latest")
            ARGS+=("--update-secrets" "R2_ACCESS_KEY=R2_ACCESS_KEY:latest")
            ARGS+=("--update-secrets" "R2_SECRET_KEY=R2_SECRET_KEY:latest")
            ARGS+=("--update-secrets" "R2_ENDPOINT=R2_ENDPOINT:latest")
            ARGS+=("--update-secrets" "SMTP_HOST=SMTP_HOST:latest")
            ARGS+=("--update-secrets" "SMTP_USERNAME=SMTP_USERNAME:latest")
            ARGS+=("--update-secrets" "SMTP_PASSWORD=SMTP_PASSWORD:latest")
            ARGS+=("--update-secrets" "PRE_AUTH_SECRET=PRE_AUTH_SECRET:latest")
            ARGS+=("--update-secrets" "GITHUB_CLIENT_ID=GITHUB_CLIENT_ID:latest")
            ARGS+=("--update-secrets" "GITHUB_CLIENT_SECRET=GITHUB_CLIENT_SECRET:latest")
            ARGS+=("--update-secrets" "GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest")
            ARGS+=("--update-secrets" "GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest")
            ARGS+=("--update-secrets" "GITLAB_CLIENT_ID=GITLAB_CLIENT_ID:latest")
            ARGS+=("--update-secrets" "GITLAB_CLIENT_SECRET=GITLAB_CLIENT_SECRET:latest")
            ARGS+=("--update-secrets" "DISCORD_CLIENT_ID=DISCORD_CLIENT_ID:latest")
            ARGS+=("--update-secrets" "DISCORD_CLIENT_SECRET=DISCORD_CLIENT_SECRET:latest")
            ARGS+=("--update-secrets" "TWITTER_CLIENT_ID=TWITTER_CLIENT_ID:latest")
            ARGS+=("--update-secrets" "TWITTER_CLIENT_SECRET=TWITTER_CLIENT_SECRET:latest")
            ARGS+=("--update-secrets" "BLUESKY_CLIENT_ID=BLUESKY_CLIENT_ID:latest")
            ARGS+=("--update-secrets" "WARDEN_API_KEY=${{ env.WARDEN_SECRET_NAME }}:latest")
            ARGS+=("--update-secrets" "WIKI_API_KEY=WIKI_API_KEY:latest")
          fi

          gcloud run deploy ${{ env.BACKEND_SERVICE }} "${ARGS[@]}" --format="value(status.url)" > backend_url.txt

          if [ "${{ env.ENV_TYPE }}" = "prod" ]; then
            BACKEND_REVISION=$(gcloud run services describe "$BACKEND_SERVICE" --region "$REGION" --format="value(status.latestReadyRevisionName)")
            echo "revision=$BACKEND_REVISION" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine API URL
        run: |
          if [ -n "${BACKEND_DOMAIN:-}" ]; then
            echo "API_URL=$BACKEND_DOMAIN/api/v1" >> $GITHUB_ENV
          else
            if [ -f backend/backend_url.txt ]; then
              echo "API_URL=$(cat backend/backend_url.txt)/api/v1" >> $GITHUB_ENV
            else
              echo "API_URL=$EXISTING_BACKEND_URL/api/v1" >> $GITHUB_ENV
            fi
          fi

      - name: Build and Deploy Frontend
        id: deploy_frontend
        if: steps.filter.outputs.frontend == 'true' || env.FRONTEND_EXISTS == 'false'
        run: |
          cd frontend
          gcloud builds submit \
            --config=cloudbuild.yml \
            --substitutions=_PUBLIC_API_URL=$API_URL,_TAG=$TAG .
          
          gcloud run deploy $FRONTEND_SERVICE \
            --image gcr.io/$PROJECT_ID/modtale-frontend:$TAG \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars "PUBLIC_API_URL=$API_URL" \
            --format="value(status.url)" > frontend_url.txt

          if [ "${{ env.ENV_TYPE }}" = "prod" ]; then
            FRONTEND_REVISION=$(gcloud run services describe "$FRONTEND_SERVICE" --region "$REGION" --format="value(status.latestReadyRevisionName)")
            echo "revision=$FRONTEND_REVISION" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Status Bot of Frontend Production Deploy
        if: env.ENV_TYPE == 'prod' && steps.deploy_frontend.outputs.revision != ''
        env:
          STATUS_DISCORD_WEBHOOK_URL: ${{ secrets.STATUS_DISCORD_WEBHOOK_URL }}
          COMPONENT_NAME: Frontend
          SERVICE_NAME: ${{ env.FRONTEND_SERVICE }}
          SERVICE_URL: ${{ env.FRONTEND_DOMAIN }}
          DEPLOYED_REVISION: ${{ steps.deploy_frontend.outputs.revision }}
        run: bash .github/scripts/notify-status-deploy.sh

      - name: Determine Frontend URL
        run: |
          if [ "${{ env.ENV_TYPE }}" = "preview" ]; then
            if [ -f frontend/frontend_url.txt ]; then
              echo "FINAL_FRONTEND_URL=$(cat frontend/frontend_url.txt)" >> $GITHUB_ENV
            else
              echo "FINAL_FRONTEND_URL=${{ env.EXISTING_FRONTEND_URL }}" >> $GITHUB_ENV
            fi
          else
            echo "FINAL_FRONTEND_URL=${{ env.FRONTEND_DOMAIN }}" >> $GITHUB_ENV
          fi

      - name: Update Backend CORS and Self-Awareness
        id: update_backend_self_awareness
        if: (steps.filter.outputs.backend == 'true' || env.BACKEND_EXISTS == 'false' || steps.filter.outputs.frontend == 'true' || env.FRONTEND_EXISTS == 'false')
        run: |
          BEFORE_REVISION=$(gcloud run services describe "${{ env.BACKEND_SERVICE }}" --region "$REGION" --format="value(status.latestReadyRevisionName)" 2>/dev/null || true)

          if [ -f backend/backend_url.txt ]; then
            B_URL=$(cat backend/backend_url.txt)
          else
            B_URL=${EXISTING_BACKEND_URL:-}
          fi

          if [ -n "${BACKEND_DOMAIN:-}" ]; then
            PUBLIC_BACKEND_URL=$BACKEND_DOMAIN
          else
            PUBLIC_BACKEND_URL=$B_URL
          fi
          
          gcloud run services update ${{ env.BACKEND_SERVICE }} \
            --region $REGION \
            --update-env-vars "FRONTEND_URL=$FINAL_FRONTEND_URL,BACKEND_URL=$PUBLIC_BACKEND_URL"

          if [ "${{ env.ENV_TYPE }}" = "prod" ]; then
            BACKEND_REVISION=$(gcloud run services describe "$BACKEND_SERVICE" --region "$REGION" --format="value(status.latestReadyRevisionName)")
            if [ "$BACKEND_REVISION" != "$BEFORE_REVISION" ]; then
              echo "revision=$BACKEND_REVISION" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Export launcher build metadata
        id: launcher_metadata
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          suffix="${TAG:-preview}-$short_sha"
          suffix="$(printf '%s' "$suffix" | sed 's/[^A-Za-z0-9.-]/-/g' | sed 's/--*/-/g' | cut -c 1-50 | sed 's/^[.-]*//;s/[.-]*$//')"
          if [ -z "$suffix" ]; then
            suffix="preview-$short_sha"
          fi

          echo "site_base_url=$FINAL_FRONTEND_URL" >> "$GITHUB_OUTPUT"
          echo "api_base_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "version=0.1.0-$suffix" >> "$GITHUB_OUTPUT"
          echo "artifact_prefix=launcher-$suffix" >> "$GITHUB_OUTPUT"

      - name: Notify Status Bot of Backend Production Deploy
        if: env.ENV_TYPE == 'prod' && (steps.update_backend_self_awareness.outputs.revision != '' || steps.deploy_backend.outputs.revision != '')
        env:
          STATUS_DISCORD_WEBHOOK_URL: ${{ secrets.STATUS_DISCORD_WEBHOOK_URL }}
          COMPONENT_NAME: Backend
          SERVICE_NAME: ${{ env.BACKEND_SERVICE }}
          SERVICE_URL: ${{ env.BACKEND_DOMAIN }}
          DEPLOYED_REVISION: ${{ steps.update_backend_self_awareness.outputs.revision || steps.deploy_backend.outputs.revision }}
        run: bash .github/scripts/notify-status-deploy.sh

      - name: Generate Deployment Summary
        if: always()
        run: |
          PUBLIC_API_URL="${API_URL:-}"

          # Define status emojis and labels
          if [ "${{ steps.filter.outputs.backend }}" = "true" ] || [ "${{ env.BACKEND_EXISTS }}" = "false" ]; then
            if [ "${{ steps.filter.outcome }}" = "success" ]; then
              BACKEND_STATUS="Deployed (Fresh Build)"
            else
              BACKEND_STATUS="Deployment Failed"
            fi
            if [ -f backend/backend_url.txt ]; then
              B_URL=$(cat backend/backend_url.txt)
            else
              B_URL="${{ env.EXISTING_BACKEND_URL }}"
            fi
          else
            BACKEND_STATUS="✨ Cached (No Changes / Reused)"
            B_URL="${{ env.EXISTING_BACKEND_URL }}"
          fi

          if [ "${{ steps.filter.outputs.frontend }}" = "true" ] || [ "${{ env.FRONTEND_EXISTS }}" = "false" ]; then
            if [ "${{ steps.filter.outcome }}" = "success" ]; then
              FRONTEND_STATUS="Deployed (Fresh Build)"
            else
              FRONTEND_STATUS="Deployment Failed"
            fi
            if [ -f frontend/frontend_url.txt ]; then
              F_URL=$(cat frontend/frontend_url.txt)
            else
              F_URL="${{ env.EXISTING_FRONTEND_URL }}"
            fi
          else
            FRONTEND_STATUS="✨ Cached (No Changes / Reused)"
            F_URL="${{ env.EXISTING_FRONTEND_URL }}"
          fi

          # Output to GitHub Step Summary
          echo "## Modtale Deployment Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment Context" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By:** \`${{ github.actor }}\` via \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** \`${{ env.ENV_TYPE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Target Service | Service URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "$PUBLIC_API_URL" ]; then
            echo "| **Backend API** | $BACKEND_STATUS | \`${{ env.BACKEND_SERVICE }}\` | [API Endpoint]($PUBLIC_API_URL) |" >> $GITHUB_STEP_SUMMARY
          elif [ -n "$B_URL" ]; then
            echo "| **Backend API** | $BACKEND_STATUS | \`${{ env.BACKEND_SERVICE }}\` | [API Endpoint]($B_URL/api/v1) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Backend API** | $BACKEND_STATUS | \`${{ env.BACKEND_SERVICE }}\` | *N/A* |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -n "$F_URL" ]; then
            echo "| **Frontend App** | $FRONTEND_STATUS | \`${{ env.FRONTEND_SERVICE }}\` | [App URL]($F_URL) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Frontend App** | $FRONTEND_STATUS | \`${{ env.FRONTEND_SERVICE }}\` | *N/A* |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*View deployment details in [Google Cloud Console](https://console.cloud.google.com/run?project=${{ env.PROJECT_ID }}).* " >> $GITHUB_STEP_SUMMARY

  package-launcher:
    name: Package Staging Launcher (${{ matrix.name }})
    needs: deploy
    if: github.repository == 'Modtale/modtale' && needs.deploy.outputs.launcher_build == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux AppImage
            os: ubuntu-latest
            artifact: linux
          - name: Windows Installer
            os: windows-latest
            artifact: windows
          - name: macOS DMG
            os: macos-latest
            artifact: macos
    defaults:
      run:
        working-directory: launcher
        shell: bash
    env:
      LAUNCHER_SITE_BASE_URL: ${{ needs.deploy.outputs.launcher_site_base_url }}
      LAUNCHER_API_BASE_URL: ${{ needs.deploy.outputs.launcher_api_base_url }}
      LAUNCHER_VERSION: ${{ needs.deploy.outputs.launcher_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate launcher target URLs
        run: |
          : "${LAUNCHER_SITE_BASE_URL:?Launcher site URL was not produced by the deploy job.}"
          : "${LAUNCHER_API_BASE_URL:?Launcher API URL was not produced by the deploy job.}"
          : "${LAUNCHER_VERSION:?Launcher version was not produced by the deploy job.}"

          echo "Launcher site URL: $LAUNCHER_SITE_BASE_URL"
          echo "Launcher API URL: $LAUNCHER_API_BASE_URL"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Linux AppImage tooling
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true
          curl -L \
            -o "$RUNNER_TEMP/appimagetool" \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x "$RUNNER_TEMP/appimagetool"
          echo "APPIMAGETOOL=$RUNNER_TEMP/appimagetool" >> "$GITHUB_ENV"
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Set up Windows installer tooling
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $wix = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset*" |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if ($null -eq $wix) {
            throw "WiX Toolset was not installed."
          }
          "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Build staging launcher package
        run: |
          ./gradlew clean packageAll \
            -PlauncherVersion="$LAUNCHER_VERSION" \
            -PmodtaleSiteBaseUrl="$LAUNCHER_SITE_BASE_URL" \
            -PmodtaleApiBaseUrl="$LAUNCHER_API_BASE_URL"

      - name: Upload staging launcher package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.deploy.outputs.launcher_artifact_prefix }}-${{ matrix.artifact }}
          path: launcher/build/distributions/*
          if-no-files-found: error
