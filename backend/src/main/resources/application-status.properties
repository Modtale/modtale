spring.application.name=modtale-status-service
spring.autoconfigure.exclude=org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration,\
  org.springframework.boot.mongodb.autoconfigure.MongoReactiveAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoReactiveAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoReactiveRepositoriesAutoConfiguration,\
  org.springframework.boot.mongodb.autoconfigure.health.MongoHealthContributorAutoConfiguration,\
  org.springframework.boot.mongodb.autoconfigure.health.MongoReactiveHealthContributorAutoConfiguration,\
  org.springdoc.core.configuration.SpringDocConfiguration,\
  org.springdoc.webmvc.core.configuration.SpringDocWebMvcConfiguration,\
  org.springdoc.webmvc.core.configuration.MultipleOpenApiSupportConfiguration,\
  org.springdoc.webmvc.ui.SwaggerConfig
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.compression.enabled=true
server.compression.mime-types=text/html,text/plain,text/css,application/javascript,application/json
server.compression.min-response-size=512

spring.session.store-type=none
spring.mongodb.uri=${STATUS_MONGODB_URI:${MONGODB_URI:}}
spring.data.mongodb.uri=${STATUS_MONGODB_URI:${MONGODB_URI:}}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

status.refresh-interval-ms=${STATUS_REFRESH_INTERVAL_MS:60000}
status.request-timeout=${STATUS_REQUEST_TIMEOUT:5s}
status.history-retention=${STATUS_HISTORY_RETENTION:720h}
status.snapshot-path=${STATUS_SNAPSHOT_PATH:/tmp/modtale-status-snapshot.json}
status.target-site-url=${STATUS_TARGET_SITE_URL:https://modtale.net}
status.target-api-url=${STATUS_TARGET_API_URL:https://api.modtale.net/actuator/health/readiness}
status.mongo-uri=${STATUS_MONGODB_URI:${MONGODB_URI:}}
status.mongo-database=${STATUS_MONGODB_DATABASE_NAME:${MONGODB_DATABASE_NAME:modtale}}
status.r2.bucket=${STATUS_R2_BUCKET_NAME:${R2_BUCKET_NAME:}}
status.r2.access-key=${STATUS_R2_ACCESS_KEY:${R2_ACCESS_KEY:}}
status.r2.secret-key=${STATUS_R2_SECRET_KEY:${R2_SECRET_KEY:}}
status.r2.endpoint=${STATUS_R2_ENDPOINT:${R2_ENDPOINT:}}
status.public-status-url=${STATUS_PUBLIC_URL:https://status.modtale.net}
status.discord-webhook-url=${STATUS_DISCORD_WEBHOOK_URL:}
status.cors-allowed-origins=${STATUS_CORS_ALLOWED_ORIGINS:*}
